name: flutter_application
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  cloud_firestore: ^6.3.0
  cupertino_icons: ^1.0.8
  firebase_app_check: ^0.4.3
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  firebase_storage: ^13.3.0
  flutter:
    sdk: flutter
  flutter_credit_card: ^4.1.0
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.2
  gap: ^3.0.1
  google_sign_in: ^6.2.1
  ionicons: ^0.2.2

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true

  assets:
    - assets/images/homePhoto/
    - assets/images/icons/
    - assets/images/products/
    - assets/images/cover/

  fonts:
    - family: "TenorSans"
      fonts:
        - asset: assets\fonts\Tenor_Sans\TenorSans-Regular.ttf
